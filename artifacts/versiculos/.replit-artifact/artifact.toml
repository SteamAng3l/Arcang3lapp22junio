kind = "web"
previewPath = "/"
title = "App de Versículos Bíblicos"
version = "1.0.0"
id = "artifacts/versiculos"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20062

[services.development]
run = "pnpm --filter @workspace/versiculos run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/versiculos", "run", "build" ]
publicDir = "artifacts/versiculos/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20062"
BASE_PATH = "/"
